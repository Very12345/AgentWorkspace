name: Website Daily Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-website:
    runs-on: ubuntu-latest
    steps:
      - name: Check if website is alive
        run: |
          URL="https://veryonly123-my-team-docs.hf.space"
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}\n" $URL)
          echo "HTTP status code: $STATUS_CODE"
          if [ $STATUS_CODE -eq 200 ]; then
            echo "! Website is up"
          else
            echo "! Website returned $STATUS_CODE (expected)"
          fi
          # 不再 exit 1，工作流永远成功